<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CurAssist Workflow</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: "Open Sans", "Helvetica Neue", Arial, sans-serif;
      display: flex; 
      flex-direction: column; 
      height: 100vh; 
    }
    
    #header { 
      height: 60px; 
      background: #276CE5; 
      color: white; 
      padding: 0 20px; 
      display: flex; 
      align-items: center;
      justify-content: space-between;
    }
    
    #main { 
      display: flex; 
      flex: 1; 
      overflow: hidden; 
    }
    
    #sidebar { 
      width: 250px; 
      background: #f0f0f0; 
      padding: 20px; 
      display: flex; 
      flex-direction: column; 
      gap: 15px;
      border-right: 1px solid #ccc;
    }
    
    #content { 
      flex: 1; 
      overflow: auto;
      padding: 20px;
      background: white;
    }
    
    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
    }
    
    button { 
      padding: 12px 20px; 
      cursor: pointer;
      border: 1px solid #ccc;
      background: white;
      border-radius: 4px;
      font-size: 14px;
      transition: all 0.2s;
    }
    
    button:hover { 
      background: #f5f5f5; 
      border-color: #276CE5;
    }
    
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .primary-btn {
      background: #276CE5;
      color: white;
      font-weight: 600;
    }
    
    .primary-btn:hover {
      background: #1a5bb8;
    }
    
    #fileInfo {
      padding: 10px;
      background: white;
      border-radius: 4px;
      font-size: 13px;
      color: #666;
    }
    
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      margin-top: 10px;
    }
    
    select {
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="header">
    <h2 id="bucketName">CurAssist Workflow</h2>
    <div id="headerInfo"></div>
  </div>
  
  <div id="main">
    <div id="sidebar">
      <div class="section-title">Bucket</div>
      <select id="bucketSelect" onchange="loadBucket()">
        <option value="">Select bucket...</option>
      </select>
      
      <div class="section-title">Subdirectory</div>
      <select id="subdirSelect" onchange="loadSubdir()">
        <option value="">Select subdirectory...</option>
      </select>
      
      <div id="fileInfo"></div>
      
      <button onclick="loadPrevious()">← Previous</button>
      <button onclick="loadNext()">Next →</button>
      
      <div class="section-title">Actions</div>
      <button class="primary-btn" onclick="saveFile()">Save Changes</button>
      
      <div class="section-title">Move To</div>
      <select id="moveToSubdir">
        <option value="">Select destination...</option>
      </select>
      <button onclick="moveFile()">Move File</button>
    </div>
    
    <div id="content">
      <iframe id="formFrame" src=""></iframe>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
