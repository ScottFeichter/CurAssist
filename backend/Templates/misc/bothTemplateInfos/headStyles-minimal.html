<!DOCTYPE html>
<html lang="en" style="height: 100%;">
  <head>
    <title>Service Template - Minimal</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    
    <!-- Font Import - Open Sans only -->
    <style>@import url(https://fonts.googleapis.com/css?family=Open+Sans:400,600,700&display=swap);</style>
    
    <!-- Minimal Essential Styles -->
    <style>
      /* Base Styles */
      html, body {
        font-size: 16px;
        line-height: 1.25;
        font-family: "Open Sans", "Helvetica Neue", Arial, sans-serif;
        font-weight: 400;
        color: #30383a;
        margin: 0;
        padding: 0;
      }
      
      body {
        min-height: inherit;
        width: 100%;
      }
      
      /* Typography */
      h1 {
        font-size: 1.875rem;
        line-height: 2.25rem;
        font-weight: 400;
      }
      
      @media screen and (max-width: 767px) {
        h1 {
          font-size: 1.75rem;
          line-height: 2.375rem;
        }
      }
      
      /* Buttons */
      button {
        font-family: "Open Sans", "Helvetica Neue", Arial, sans-serif;
        cursor: pointer;
      }
      
      /* Links */
      a {
        color: #276ce5;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s;
      }
      
      a:hover {
        color: #0856ad;
        text-decoration: underline;
      }
      
      /* Form Elements */
      input, textarea {
        font-family: "Open Sans", "Helvetica Neue", Arial, sans-serif;
      }
    </style>
  </head>
  
  <body>
    <!-- Your form content goes here -->
  </body>
</html>
