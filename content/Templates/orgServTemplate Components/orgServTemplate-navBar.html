<!---=========================================================================== VERTICAL LEFT NAV BAR START ============================================================================-->
<!------------------------------------------------------------------------------ HTML ------------------------------------------------------------------------------->
<!-- Vertical Left Navigation Bar -->
<nav class="app-components-edit-EditSidebar-module__sidebar--npORK" id="sidebar">
  <div class="app-components-edit-EditSidebar-module__sidebarContent--zw_PI">

    <h3 class="app-components-edit-EditSidebar-module__listHeading--pbhfh">
      <a href="#organization" onclick="scrollToOrganization(event)">Organization</a>
    </h3>
    <ul class="app-components-edit-EditSidebar-module__list--EdtMl">
      <li class="app-components-edit-EditSidebar-module__listItem--HBckV app-components-edit-EditSidebar-module__active--IatxP">
        <a href="#" id="orgNavLink" onclick="searchOrganization(event, this.textContent)">{{organization_name}}</a>
      </li>
    </ul>

    <h3 class="app-components-edit-EditSidebar-module__listHeading--pbhfh">
      <a href="#services" onclick="scrollToFirstService(event)">Services</a>
    </h3>
    <div style="padding: 0 25px 10px; display: flex; gap: 8px; flex-wrap: nowrap;">
      <button type="button" class="app-components-edit-EditSidebar-module__serviceActionButton--rxLK8" id="add_blank" onclick="addNewService()">add blank</button>
      <button type="button" class="app-components-edit-EditSidebar-module__serviceActionButton--rxLK8" id="add_from" onclick="addServiceFrom()">add from</button>
    </div>
    <ul class="app-components-edit-EditSidebar-module__list--EdtMl" id="servicesList">
    </ul>

  </div>
  <div class="sidebar-resizer" id="sidebarResizer"></div>
</nav>

<!------------------------------------------------------------------------------ CSS ------------------------------------------------------------------------------->
<style>
  .app-components-edit-EditSidebar-module__sidebar--npORK {
    width: 15.625rem;
    min-width: 10rem;
    max-width: 40rem;
    background-color: #f9f9f9;
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 5rem;
    height: 94vh;
    transition: width 0.3s ease;
  }

  .app-components-edit-EditSidebar-module__sidebar--npORK.collapsed {
    width: 0;
    min-width: 0;
    overflow: hidden;
  }

  .sidebar-toggle {
    display: block;
    margin-bottom: 10px;
    width: 30px;
    height: 30px;
    background: #276ce5;
    color: white;
    border: 1px solid #1a5bb8;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .sidebar-toggle:hover {
    background: #1a5bb8;
  }

  .sidebar-resizer {
    position: absolute;
    right: 0;
    top: 0;
    width: 5px;
    height: 100%;
    cursor: ew-resize;
    background: transparent;
  }

  .sidebar-resizer:hover {
    background: #276ce5;
  }

  .app-components-edit-EditSidebar-module__sidebarContent--zw_PI {
    overflow-y: auto;
    overflow-x: hidden;
  }

  .app-components-edit-EditSidebar-module__list--EdtMl {
    border-bottom: 1px solid #f4f4f4;
    padding-bottom: 20px;
    list-style: none;
  }

  .app-components-edit-EditSidebar-module__list--EdtMl:last-of-type {
    border-bottom: 0;
  }

  .app-components-edit-EditSidebar-module__listHeading--pbhfh {
    padding: 20px 25px 10px;
    text-transform: uppercase;
    font-size: 0.8125rem;
    font-weight: 600;
    color: #484848;
  }

  .app-components-edit-EditSidebar-module__listHeading--pbhfh a {
    color: #484848;
    text-decoration: none;
  }

  .app-components-edit-EditSidebar-module__listHeading--pbhfh a:hover {
    color: #276ce5;
    text-decoration: underline;
  }

  .app-components-edit-EditSidebar-module__listItem--HBckV {
    font-size: 15px;
  }

  .app-components-edit-EditSidebar-module__listItem--HBckV a {
    color: #888;
    border-left: none !important;
    text-overflow: ellipsis;
    white-space: nowrap;
    overflow: hidden;
    width: 100%;
    padding: 11px 25px 11px 25px;
    height: 2.5rem;
    display: block;
  }

  .app-components-edit-EditSidebar-module__listItem--HBckV a:hover {
    text-decoration: none;
    color: #276ce5;
  }

  .app-components-edit-EditSidebar-module__listItem--HBckV.app-components-edit-EditSidebar-module__active--IatxP a {
    color: #276ce5;
    border-left: none !important;
  }

  .app-components-edit-EditSidebar-module__serviceActionButton--rxLK8 {
    color: #666;
    background: none;
    padding: 2px 8px;
    height: auto;
    float: right;
    font-size: 0.75rem;
    border: 1px solid #666;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .app-components-edit-EditSidebar-module__serviceActionButton--rxLK8:hover {
    color: #276ce5;
    border-color: #276ce5;
  }


</style>

<!------------------------------------------------------------------------------ JS ------------------------------------------------------------------------------->
<script>
  function searchOrganization(event, orgName) {
    event.preventDefault();
    alert('You are visiting an external site.');
    const searchUrl = `https://www.sfserviceguide.org/search?query=${encodeURIComponent(orgName)}`;
    window.open(searchUrl, '_blank');
  }

  function scrollToOrganization(event) {
    event.preventDefault();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function scrollToFirstService(event) {
    event.preventDefault();
    const orgServicesDiv = document.getElementById('orgServicesDiv');
    const firstService = orgServicesDiv?.firstElementChild;
    if (firstService) {
      firstService.scrollIntoView({ behavior: 'smooth' });
    }
  }

  function addNewService() {
    console.log('addNewService called');
    
    // Generate unique service ID
    const serviceId = 'service-' + Date.now();
    console.log('serviceId:', serviceId);
    
    // Determine next placeholder name
    const servicesList = document.getElementById('servicesList');
    const existingLinks = Array.from(servicesList.querySelectorAll('a'));
    const placeholderPattern = /^New Service (\d+)$/;
    let maxNum = 0;
    
    existingLinks.forEach(link => {
      const match = link.textContent.match(placeholderPattern);
      if (match) {
        maxNum = Math.max(maxNum, parseInt(match[1]));
      }
    });
    
    const placeholderName = `New Service ${maxNum + 1}`;
    console.log('placeholderName:', placeholderName);
    
    // Add service link to navbar
    const li = document.createElement('li');
    li.className = 'app-components-edit-EditSidebar-module__listItem--HBckV';
    li.dataset.serviceId = serviceId;
    const link = document.createElement('a');
    link.href = `#${serviceId}`;
    link.textContent = placeholderName;
    link.onclick = (e) => {
      e.preventDefault();
      const targetDiv = document.getElementById(serviceId);
      if (targetDiv) targetDiv.scrollIntoView({ behavior: 'smooth' });
    };
    li.appendChild(link);
    servicesList.appendChild(li);
    console.log('Added link to navbar');
    
    // Find the ServiceDiv template to clone
    const serviceTemplate = document.getElementById('serviceDivOrganization');
    if (!serviceTemplate) {
      console.error('serviceDivOrganization not found');
      return;
    }
    
    // Clone the entire service div
    const newServiceDiv = serviceTemplate.cloneNode(true);
    newServiceDiv.id = serviceId;
    newServiceDiv.style.display = '';
    console.log('Cloned service div');
    
    // Clear all inputs to make it blank
    newServiceDiv.querySelectorAll('input, textarea').forEach(input => input.value = '');
    newServiceDiv.querySelectorAll('.Select-multi-value-wrapper .Select-value').forEach(pill => pill.remove());
    newServiceDiv.querySelectorAll('.Select-placeholder').forEach(ph => ph.style.display = 'block');
    console.log('Cleared inputs');
    
    // Wire up Remove Service button
    const removeBtn = newServiceDiv.querySelector('#service--deactivation');
    if (removeBtn) {
      removeBtn.addEventListener('click', () => {
        newServiceDiv.remove();
        const navItem = servicesList.querySelector(`[data-service-id="${serviceId}"]`);
        if (navItem) navItem.remove();
      });
    }

    // Update navbar when service name changes
    const serviceNameInput = newServiceDiv.querySelector('#service_name');
    if (serviceNameInput) {
      serviceNameInput.addEventListener('input', function() {
        const navLink = servicesList.querySelector(`[data-service-id="${serviceId}"] a`);
        if (navLink) {
          navLink.textContent = this.value || placeholderName;
        }
      });
    }
    
    // Append to orgServicesDiv container
    const orgServicesDiv = document.getElementById('orgServicesDiv');
    console.log('orgServicesDiv:', orgServicesDiv);
    if (!orgServicesDiv) {
      console.error('orgServicesDiv container not found');
      return;
    }
    
    orgServicesDiv.appendChild(newServiceDiv);
    console.log('Appended to orgServicesDiv');
    
    // Scroll to new service
    setTimeout(() => {
      newServiceDiv.scrollIntoView({ behavior: 'smooth' });
    }, 100);
  }

  function addServiceFrom() {
    // Get all available services
    const serviceTemplate = document.getElementById('serviceDivOrganization');
    const orgServicesDiv = document.getElementById('orgServicesDiv');
    const existingServices = orgServicesDiv ? Array.from(orgServicesDiv.children) : [];
    
    // Build list of available services
    const availableServices = [];
    
    // Add original service if it exists
    if (serviceTemplate) {
      const serviceName = serviceTemplate.querySelector('#service_name')?.value || 'Original Service';
      availableServices.push({ id: 'serviceDivOrganization', name: serviceName, element: serviceTemplate });
    }
    
    // Add existing services from orgServicesDiv
    existingServices.forEach(service => {
      const serviceName = service.querySelector('#service_name')?.value || 'Unnamed Service';
      availableServices.push({ id: service.id, name: serviceName, element: service });
    });
    
    if (availableServices.length === 0) {
      alert('No other services to copy from');
      return;
    }
    
    // Create modal with dropdown
    const modal = document.createElement('div');
    modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999';
    
    const dialog = document.createElement('div');
    dialog.style.cssText = 'background:white;padding:20px;border-radius:8px;min-width:300px';
    
    const label = document.createElement('label');
    label.textContent = 'Select a service to copy from:';
    label.style.cssText = 'display:block;margin-bottom:10px;font-weight:600';
    
    const select = document.createElement('select');
    select.style.cssText = 'width:100%;padding:8px;margin-bottom:15px;font-size:14px';
    availableServices.forEach((service, index) => {
      const option = document.createElement('option');
      option.value = index;
      option.textContent = service.name;
      select.appendChild(option);
    });
    
    const btnContainer = document.createElement('div');
    btnContainer.style.cssText = 'display:flex;gap:10px;justify-content:center';
    
    const cancelBtn = document.createElement('button');
    cancelBtn.textContent = 'Cancel';
    cancelBtn.style.cssText = 'padding:8px 16px;background:white;color:#666;border:1px solid #ccc;cursor:pointer';
    cancelBtn.onclick = () => modal.remove();
    
    const copyBtn = document.createElement('button');
    copyBtn.textContent = 'Copy';
    copyBtn.style.cssText = 'padding:8px 16px;background:#276ce5;color:white;border:none;cursor:pointer';
    copyBtn.onclick = () => {
      const selectedIndex = parseInt(select.value);
      const selectedService = availableServices[selectedIndex];
      modal.remove();
      cloneService(selectedService);
    };
    
    btnContainer.appendChild(cancelBtn);
    btnContainer.appendChild(copyBtn);
    dialog.appendChild(label);
    dialog.appendChild(select);
    dialog.appendChild(btnContainer);
    modal.appendChild(dialog);
    document.body.appendChild(modal);
  }
  
  function cloneService(selectedService) {
    const orgServicesDiv = document.getElementById('orgServicesDiv');
    if (!orgServicesDiv) return;
    
    // Generate unique service ID
    const serviceId = 'service-' + Date.now();
    
    // Clone the selected service (keeping all values)
    const newServiceDiv = selectedService.element.cloneNode(true);
    newServiceDiv.id = serviceId;
    newServiceDiv.style.display = '';
    
    // Get the service name for navbar
    const serviceName = newServiceDiv.querySelector('#service_name')?.value || 'Copied Service';
    
    // Add service link to navbar
    const servicesList = document.getElementById('servicesList');
    const li = document.createElement('li');
    li.className = 'app-components-edit-EditSidebar-module__listItem--HBckV';
    li.dataset.serviceId = serviceId;
    const link = document.createElement('a');
    link.href = `#${serviceId}`;
    link.textContent = serviceName;
    link.onclick = (e) => {
      e.preventDefault();
      const targetDiv = document.getElementById(serviceId);
      if (targetDiv) targetDiv.scrollIntoView({ behavior: 'smooth' });
    };
    li.appendChild(link);
    servicesList.appendChild(li);
    
    // Wire up Remove Service button
    const removeBtn = newServiceDiv.querySelector('#service--deactivation');
    if (removeBtn) {
      removeBtn.addEventListener('click', () => {
        newServiceDiv.remove();
        const navItem = servicesList.querySelector(`[data-service-id="${serviceId}"]`);
        if (navItem) navItem.remove();
      });
    }

    // Update navbar when service name changes
    const serviceNameInput = newServiceDiv.querySelector('#service_name');
    if (serviceNameInput) {
      serviceNameInput.addEventListener('input', function() {
        const navLink = servicesList.querySelector(`[data-service-id="${serviceId}"] a`);
        if (navLink) {
          navLink.textContent = this.value || 'Copied Service';
        }
      });
    }
    
    // Append to orgServicesDiv container
    orgServicesDiv.appendChild(newServiceDiv);
    
    // Scroll to new service
    setTimeout(() => {
      newServiceDiv.scrollIntoView({ behavior: 'smooth' });
    }, 100);
  }

  // Update organization name in navbar when input changes
  document.addEventListener('DOMContentLoaded', function() {
    const orgNameInput = document.getElementById('organization_name');
    const orgNavLink = document.getElementById('orgNavLink');
    
    if (orgNameInput && orgNavLink) {
      orgNameInput.addEventListener('input', function() {
        orgNavLink.textContent = this.value || '{{organization_name}}';
      });
    }

    // Sidebar collapse toggle
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('sidebarToggle');
    
    if (sidebar && toggleBtn) {
      toggleBtn.addEventListener('click', function() {
        sidebar.classList.toggle('collapsed');
        toggleBtn.textContent = sidebar.classList.contains('collapsed') ? '▶' : '◀';
      });
    }

    // Sidebar resize
    const resizer = document.getElementById('sidebarResizer');
    if (sidebar && resizer) {
      let isResizing = false;
      
      resizer.addEventListener('mousedown', function(e) {
        isResizing = true;
        document.body.style.cursor = 'ew-resize';
      });
      
      document.addEventListener('mousemove', function(e) {
        if (!isResizing) return;
        const newWidth = e.clientX;
        if (newWidth >= 160 && newWidth <= 640) {
          sidebar.style.width = newWidth + 'px';
        }
      });
      
      document.addEventListener('mouseup', function() {
        isResizing = false;
        document.body.style.cursor = '';
      });
    }
  });
</script>
<!---=========================================================================== VERTICAL LEFT NAV BAR END =============================================================================-->
