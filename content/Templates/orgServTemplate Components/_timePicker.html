<style>
  input[type="time"]::-webkit-calendar-picker-indicator { display: none; }

  .time-input-wrap {
    display: inline-flex;
    align-items: center;
    flex: 1 1 auto;
    border: 1px solid #ddd;
    border-radius: 3px;
    background-color: #f0f0f0;
    padding: 0 6px 0 0;
    margin-right: .625rem;
  }
  .time-input-wrap input[type="time"] {
    flex: 1 1 auto;
    border: none !important;
    outline: none !important;
    background: transparent;
    margin: 0 !important;
    padding-right: 0;
  }
  .time-input-wrap:last-of-type { margin-right: 0; }

  .time-picker-icon {
    cursor: pointer;
    font-size: 18px;
    vertical-align: middle;
    margin-left: 4px;
    color: #555;
    user-select: none;
  }
  .time-picker-icon:hover { color: #276ce5; }

  #timePickerModal {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2000;
  }
  #timePickerModal.open { display: flex; }

  #timePickerModal .tp-content {
    background: #fff;
    border-radius: 8px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    min-width: 220px;
  }
  #timePickerModal .tp-drums {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .tp-drum {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 52px;
  }
  .tp-drum button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 14px;
    color: #555;
    padding: 4px 0;
    width: 100%;
  }
  .tp-drum button:hover { background: #f0f0f0; }
  .tp-drum .tp-val {
    font-size: 22px;
    font-weight: 600;
    padding: 6px 0;
    width: 100%;
    text-align: center;
    background: #f7f9ff;
    border-top: 1px solid #dde3f0;
    border-bottom: 1px solid #dde3f0;
  }
  .tp-sep {
    font-size: 22px;
    font-weight: 700;
    padding-bottom: 4px;
  }
  #timePickerModal .tp-actions {
    display: flex;
    gap: 10px;
  }
  #timePickerModal .tp-actions button {
    padding: 8px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
  }
  #tpConfirmBtn { background: #276ce5; color: #fff; }
  #tpCancelBtn  { background: #ddd; }
</style>

<!-- Time Picker Modal -->
<div id="timePickerModal">
  <div class="tp-content">
    <div class="tp-drums">
      <div class="tp-drum" id="tpHourDrum">
        <button type="button" id="tpHourUp">▲</button>
        <div class="tp-val" id="tpHourVal">--</div>
        <button type="button" id="tpHourDown">▼</button>
      </div>
      <div class="tp-sep">:</div>
      <div class="tp-drum" id="tpMinDrum">
        <button type="button" id="tpMinUp">▲</button>
        <div class="tp-val" id="tpMinVal">--</div>
        <button type="button" id="tpMinDown">▼</button>
      </div>
      <div class="tp-drum" id="tpPeriodDrum">
        <button type="button" id="tpPeriodUp">▲</button>
        <div class="tp-val" id="tpPeriodVal">--</div>
        <button type="button" id="tpPeriodDown">▼</button>
      </div>
    </div>
    <div class="tp-actions">
      <button type="button" id="tpConfirmBtn">OK</button>
      <button type="button" id="tpCancelBtn">Cancel</button>
    </div>
  </div>
</div>

<script>
  (function() {
    const HOURS   = ['--','01','02','03','04','05','06','07','08','09','10','11','12'];
    const MINUTES = ['--','00','15','30','45'];
    const PERIODS = ['--','AM','PM'];

    let hIdx = 0, mIdx = 0, pIdx = 0;
    let activeInput = null;

    const modal     = document.getElementById('timePickerModal');
    const hVal      = document.getElementById('tpHourVal');
    const mVal      = document.getElementById('tpMinVal');
    const pVal      = document.getElementById('tpPeriodVal');

    function cycle(arr, idx, dir) { return (idx + dir + arr.length) % arr.length; }
    function render() {
      hVal.textContent = HOURS[hIdx];
      mVal.textContent = MINUTES[mIdx];
      pVal.textContent = PERIODS[pIdx];
    }

    document.getElementById('tpHourUp').addEventListener('click',    () => { hIdx = cycle(HOURS,   hIdx, -1); render(); });
    document.getElementById('tpHourDown').addEventListener('click',  () => { hIdx = cycle(HOURS,   hIdx,  1); render(); });
    document.getElementById('tpMinUp').addEventListener('click',     () => { mIdx = cycle(MINUTES, mIdx, -1); render(); });
    document.getElementById('tpMinDown').addEventListener('click',   () => { mIdx = cycle(MINUTES, mIdx,  1); render(); });
    document.getElementById('tpPeriodUp').addEventListener('click',  () => { pIdx = cycle(PERIODS, pIdx, -1); render(); });
    document.getElementById('tpPeriodDown').addEventListener('click',() => { pIdx = cycle(PERIODS, pIdx,  1); render(); });

    document.getElementById('tpConfirmBtn').addEventListener('click', () => {
      if (activeInput) {
        if (hIdx === 0 || mIdx === 0 || pIdx === 0) {
          activeInput.value = '';
        } else {
          let h = parseInt(HOURS[hIdx]);
          if (PERIODS[pIdx] === 'AM' && h === 12) h = 0;
          if (PERIODS[pIdx] === 'PM' && h !== 12) h += 12;
          activeInput.value = `${String(h).padStart(2,'0')}:${MINUTES[mIdx]}`;
        }
      }
      modal.classList.remove('open');
      activeInput = null;
    });

    document.getElementById('tpCancelBtn').addEventListener('click', () => {
      modal.classList.remove('open');
      activeInput = null;
    });

    window.openTimePicker = function(input) {
      activeInput = input;
      hIdx = 0; mIdx = 0; pIdx = 0;

      if (input.value) {
        const [hh, mm] = input.value.split(':');
        let h = parseInt(hh);
        const period = h >= 12 ? 'PM' : 'AM';
        if (h === 0) h = 12;
        else if (h > 12) h -= 12;
        const hi = HOURS.indexOf(String(h).padStart(2,'0'));
        const mi = MINUTES.indexOf(mm);
        const pi = PERIODS.indexOf(period);
        if (hi > 0) hIdx = hi;
        if (mi > 0) mIdx = mi;
        if (pi > 0) pIdx = pi;
      }

      render();
      modal.classList.add('open');
    };
  })();
</script>
