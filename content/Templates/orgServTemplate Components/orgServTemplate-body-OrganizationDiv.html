<!------------------------------------------------------------------------------ JS -------------------------------------------------------------------------------->

                  <script>
                    document.addEventListener('DOMContentLoaded', function() {
                      const locationModal = document.getElementById('addLocationModal');
                      const phoneModal = document.getElementById('addPhoneModal');
                      const noteModal = document.getElementById('addNoteModal');

                      // Find all Add buttons by their text content
                      const allButtons = document.querySelectorAll('button');

                      allButtons.forEach(btn => {
                        const text = btn.textContent.trim();

                        if (text === 'Add Location') {
                          btn.addEventListener('click', () => {
                            locationModal.style.display = 'flex';
                          });
                        } else if (text === 'Add Phone') {
                          btn.addEventListener('click', () => {
                            phoneModal.style.display = 'flex';
                          });
                        } else if (text === 'Add Note') {
                          btn.addEventListener('click', () => {
                            noteModal.style.display = 'flex';
                          });
                        }
                      });

                      // Location modal handlers
                      document.getElementById('cancelLocationBtn').addEventListener('click', () => {
                        locationModal.style.display = 'none';
                      });

                      document.getElementById('addLocationBtn').addEventListener('click', () => {
                        const name = document.getElementById('locationName').value;
                        const addr1 = document.getElementById('addressLine1').value;
                        const addr2 = document.getElementById('addressLine2').value;
                        const city = document.getElementById('city').value;
                        const state = document.getElementById('state').value;
                        const zip = document.getElementById('zip').value;

                        // Find the location list
                        const locationList = document.getElementById('organization_locations');
                        const div = document.createElement('div');
                        div.innerHTML = `<strong>${name}</strong><br>${addr1}${addr2 ? '<br>' + addr2 : ''}<br>${city}, ${state} ${zip}`;
                        locationList.appendChild(div);

                        // Clear and close
                        document.getElementById('locationName').value = '';
                        document.getElementById('addressLine1').value = '';
                        document.getElementById('addressLine2').value = '';
                        document.getElementById('city').value = '';
                        document.getElementById('state').value = '';
                        document.getElementById('zip').value = '';
                        locationModal.style.display = 'none';
                      });

                      // Phone modal handlers
                      document.getElementById('cancelPhoneBtn').addEventListener('click', () => {
                        phoneModal.style.display = 'none';
                      });

                      document.getElementById('addPhoneBtn').addEventListener('click', () => {
                        const name = document.getElementById('phoneName').value;
                        const number = document.getElementById('phoneNumber').value;

                        // Find the phone sublist
                        const phoneSublist = document.querySelectorAll('#organizationDiv .edit--section--list--item--sublist')[1];
                        const li = document.createElement('li');
                        li.innerHTML = `<strong>${name}:</strong> ${number}`;
                        phoneSublist.appendChild(li);

                        // Clear and close
                        document.getElementById('phoneName').value = '';
                        document.getElementById('phoneNumber').value = '';
                        phoneModal.style.display = 'none';
                      });

                      // Note modal handlers
                      document.getElementById('cancelNoteBtn').addEventListener('click', () => {
                        noteModal.style.display = 'none';
                      });

                      document.getElementById('addNoteBtn').addEventListener('click', () => {
                        const note = document.getElementById('noteText').value;

                        // Find the note sublist
                        const noteSublist = document.querySelectorAll('#organizationDiv .edit--section--list--item--sublist')[2];
                        const li = document.createElement('li');
                        li.textContent = note;
                        noteSublist.appendChild(li);

                        // Clear and close
                        document.getElementById('noteText').value = '';
                        noteModal.style.display = 'none';
                      });
                    });
                  </script>




<!------------------------------------------------------------------------------ MODALS HTML ------------------------------------------------------------------------------->

                  <!-- Add Location Modal -->
                  <div id="addLocationModal" class="modal" style="display:none;">
                    <div class="modal-content">
                      <h3>Add Location</h3>
                      <input type="text" id="locationName" placeholder="Location Name">
                      <input type="text" id="addressLine1" placeholder="Address Line 1">
                      <input type="text" id="addressLine2" placeholder="Address Line 2">
                      <input type="text" id="city" placeholder="City">
                      <input type="text" id="state" placeholder="State">
                      <input type="text" id="zip" placeholder="Zip">
                      <button id="addLocationBtn">Add Location</button>
                      <button id="cancelLocationBtn">Cancel</button>
                    </div>
                  </div>

                  <!-- Add Phone Modal -->
                  <div id="addPhoneModal" class="modal" style="display:none;">
                    <div class="modal-content">

                      <input type="text" id="phoneNumber" placeholder="Number">

                    </div>
                  </div>

                  <!-- Add Note Modal -->
                  <div id="addNoteModal" class="modal" style="display:none;">
                    <div class="modal-content">
                      <h3>Add Note</h3>
                      <textarea id="noteText" placeholder="Enter note (markdown supported)"></textarea>
                      <button id="addNoteBtn">Add Note</button>
                      <button id="cancelNoteBtn">Cancel</button>

                  <style>

                    .modal-content {

                      min-width: 400px;

                    }
                    .modal-content h3 {

                    .modal-content input,

                      border-radius: 4px;
                      box-sizing: border-box;

                    .modal-content button {

                      border: none;
                      border-radius: 4px;

                    .modal-content button:first-of-type {
